<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>~/startpage</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="x-icon" href="favicon.ico">
    <style>
        /* ── Token Gate Overlay ── */
        #token-gate {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        #token-gate.show { display: flex; }
        #token-box {
            background: #282828;
            border: 1px solid #83a598;
            border-radius: 10px;
            padding: 35px 40px;
            max-width: 480px;
            width: 90%;
            color: #ebdbb2;
            font-family: "Fira Code", monospace;
        }
        #token-box h2 {
            color: #fe8019;
            margin: 0 0 10px 0;
            text-align: left;
            font-size: 1.1em;
        }
        #token-box p {
            font-size: 0.82em;
            color: #a89984;
            margin: 0 0 18px 0;
            line-height: 1.6;
        }
        #token-box p a { color: #83a598; }
        #token-input {
            width: 100%;
            padding: 10px;
            background: #3c3836;
            border: 1px solid #83a598;
            border-radius: 5px;
            color: #ebdbb2;
            font-family: "Fira Code", monospace;
            font-size: 0.9em;
            box-sizing: border-box;
            margin-bottom: 14px;
        }
        #token-submit {
            background: #fe8019;
            color: #282828;
            border: none;
            padding: 10px 22px;
            border-radius: 5px;
            cursor: pointer;
            font-family: "Fira Code", monospace;
            font-size: 0.95em;
            width: 100%;
        }
        #token-submit:hover { background: #d65d0e; }
        #token-error {
            color: #cc241d;
            font-size: 0.82em;
            margin-top: 10px;
            min-height: 18px;
        }
        #token-loading {
            color: #83a598;
            font-size: 0.82em;
            margin-top: 10px;
        }
        /* ── Sync indicator ── */
        #sync-indicator {
            position: fixed;
            bottom: 14px;
            right: 18px;
            font-family: "Fira Code", monospace;
            font-size: 0.75em;
            color: #a89984;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- ── Token Gate ── -->
    <div id="token-gate" class="show">
        <div id="token-box">
            <h2>> enter github token_</h2>
            <p>
                A <strong>GitHub Personal Access Token</strong> with <code>gist</code> scope is required
                to sync your bookmarks across devices.<br><br>
                Create one at <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens</a>
                → select <strong>gist</strong> scope only.<br>
                Your token is cached locally for <strong>30 days</strong>.
            </p>
            <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
            <button id="token-submit">Connect &amp; Sync</button>
            <div id="token-error"></div>
            <div id="token-loading"></div>
        </div>
    </div>

    <!-- ── Sync Indicator ── -->
    <div id="sync-indicator"></div>

    <div class="container">
        <div class="left-container">
            <button id="settings-button" class="top-left-link-button"></button>
            <div class="gif">
                <img src="cat.gif" />
            </div>
        </div>

        <div class="right-container">
            <a href="https://claude.ai/new" class="top-right-link-button button-1" target="_blank"></a>
            <a href="https://gemini.google.com/app" class="top-right-link-button button-2" target="_blank"></a>
            <a href="https://chatgpt.com" class="top-right-link-button button-3" target="_blank"></a>
            <div class="datetime-container">
                <div id="current-datetime"></div>
            </div>
            <div class="head">
                <span id="prompt-prefix">> cd ~/</span><span id="search-text"></span><span id="blinker" class="blinking">_</span>
            </div>
            <div class="bookmarks" id="bookmarks-container"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Edit Bookmarks</h2>
            <div id="modal-categories"></div>
            <button id="add-category-button" class="modal-button">Add New Category</button>
            <button id="save-settings-button" class="modal-button">Save Changes</button>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════
    //  DATABASE SCHEMA (stored as JSON in a GitHub Gist)
    //  File: startpage-bookmarks.json
    //  Schema:
    //  [
    //    {
    //      "title": "category name",
    //      "links": [
    //        { "text": "link label", "url": "https://...", "starred": false }
    //      ]
    //    }
    //  ]
    // ═══════════════════════════════════════════════════

    // ── Constants ──────────────────────────────────────
    const STORAGE_KEY_TOKEN      = 'sp_token';
    const STORAGE_KEY_EXPIRY     = 'sp_token_expiry';
    const STORAGE_KEY_GIST_ID    = 'sp_gist_id';
    const GIST_FILENAME          = 'startpage-bookmarks.json';
    const TOKEN_TTL_MS           = 30 * 24 * 60 * 60 * 1000; // 30 days
    const GIST_API               = 'https://api.github.com';

    // ── Token helpers ──────────────────────────────────
    function getStoredToken() {
        const expiry = localStorage.getItem(STORAGE_KEY_EXPIRY);
        if (!expiry || Date.now() > parseInt(expiry, 10)) {
            localStorage.removeItem(STORAGE_KEY_TOKEN);
            localStorage.removeItem(STORAGE_KEY_EXPIRY);
            return null;
        }
        return localStorage.getItem(STORAGE_KEY_TOKEN);
    }

    function storeToken(token) {
        localStorage.setItem(STORAGE_KEY_TOKEN, token);
        localStorage.setItem(STORAGE_KEY_EXPIRY, String(Date.now() + TOKEN_TTL_MS));
    }

    function clearToken() {
        localStorage.removeItem(STORAGE_KEY_TOKEN);
        localStorage.removeItem(STORAGE_KEY_EXPIRY);
        localStorage.removeItem(STORAGE_KEY_GIST_ID);
    }

    function gistHeaders(token) {
        return {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };
    }

    // ── Gist CRUD ──────────────────────────────────────
    async function findOrCreateGist(token) {
        // Search existing gists for our file
        let page = 1;
        while (true) {
            const res = await fetch(`${GIST_API}/gists?per_page=100&page=${page}`, {
                headers: gistHeaders(token)
            });
            if (!res.ok) throw new Error('Failed to list gists');
            const gists = await res.json();
            if (gists.length === 0) break;
            const found = gists.find(g => g.files && g.files[GIST_FILENAME]);
            if (found) return found.id;
            if (gists.length < 100) break;
            page++;
        }
        // Not found — create a new private gist with default data
        const res = await fetch(`${GIST_API}/gists`, {
            method: 'POST',
            headers: gistHeaders(token),
            body: JSON.stringify({
                description: 'Startpage Bookmarks',
                public: false,
                files: {
                    [GIST_FILENAME]: { content: JSON.stringify(DEFAULT_BOOKMARKS, null, 2) }
                }
            })
        });
        if (!res.ok) throw new Error('Failed to create gist');
        const gist = await res.json();
        return gist.id;
    }

    async function loadFromGist(token, gistId) {
        const res = await fetch(`${GIST_API}/gists/${gistId}`, {
            headers: gistHeaders(token),
            cache: 'no-store'
        });
        if (!res.ok) throw new Error('Failed to load gist');
        const gist = await res.json();
        const content = gist.files[GIST_FILENAME]?.content;
        if (!content) throw new Error('Gist file missing');
        return JSON.parse(content);
    }

    async function saveToGist(token, gistId, data) {
        const res = await fetch(`${GIST_API}/gists/${gistId}`, {
            method: 'PATCH',
            headers: gistHeaders(token),
            body: JSON.stringify({
                files: {
                    [GIST_FILENAME]: { content: JSON.stringify(data, null, 2) }
                }
            })
        });
        if (!res.ok) throw new Error('Failed to save to gist');
        return true;
    }

    // ── Clean data (FIX: strip DOM nodes before serialising) ──
    // The DOMException: HTMLLIElement could not be cloned was caused by
    // allOriginalLinks (DOM elements) being attached to bookmarksData objects.
    function getSerializableData(data) {
        return data.map(cat => ({
            title: cat.title,
            links: (cat.links || []).map(link => ({
                text:    link.text    || '',
                url:     link.url     || '',
                starred: !!link.starred
            }))
        }));
    }

    const syncEl = document.getElementById('sync-indicator');
    function setSyncStatus(msg, color) {
        syncEl.style.color = color || '#a89984';
        syncEl.textContent = msg;
    }

                { text: 'virus find', url: 'https://www.virustotal.com/gui/home/upload', starred: false },

    // ═══════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════
    let bookmarksData = [];
    let authToken     = null;
    let gistId        = null;

    // ═══════════════════════════════════════════════════
    //  INIT — token gate
    // ═══════════════════════════════════════════════════
    async function init() {
        authToken = getStoredToken();
        gistId    = localStorage.getItem(STORAGE_KEY_GIST_ID);

        if (authToken && gistId) {
            await bootstrapApp();
        } else if (authToken && !gistId) {
            // Token exists but gist ID lost — re-discover
            try {
                setSyncStatus('⟳ discovering gist…');
                gistId = await findOrCreateGist(authToken);
                localStorage.setItem(STORAGE_KEY_GIST_ID, gistId);
                await bootstrapApp();
            } catch (e) {
                // Token may be expired/invalid
                clearToken();
                showTokenGate();
            }
        } else {
            showTokenGate();
        }
    }

    function showTokenGate() {
        document.getElementById('token-gate').classList.add('show');
    }

    function hideTokenGate() {
        document.getElementById('token-gate').classList.remove('show');
    }

    async function bootstrapApp() {
        try {
            setSyncStatus('⟳ syncing…');
            bookmarksData = await loadFromGist(authToken, gistId);
            setSyncStatus('✓ synced', '#b8bb26');
            setTimeout(() => setSyncStatus(''), 2500);
        } catch (e) {
            setSyncStatus('⚠ offline — using local cache', '#fabd2f');
            // Fall back to localStorage cache
            const cached = localStorage.getItem('bookmarksData_cache');
            bookmarksData = cached ? JSON.parse(cached) : DEFAULT_BOOKMARKS;
        }
        hideTokenGate();
        renderBookmarks();
    }

    // ── Token Gate Submit ──────────────────────────────
    document.getElementById('token-submit').addEventListener('click', async () => {
        const input     = document.getElementById('token-input');
        const errorEl   = document.getElementById('token-error');
        const loadingEl = document.getElementById('token-loading');
        const token     = input.value.trim();

        errorEl.textContent   = '';
        loadingEl.textContent = '';

        if (!token) {
            errorEl.textContent = 'Token cannot be empty.';
            return;
        }

        loadingEl.textContent = '⟳ Verifying token and finding/creating gist…';
        document.getElementById('token-submit').disabled = true;

        try {
            // Validate token
            const userRes = await fetch(`${GIST_API}/user`, { headers: gistHeaders(token) });
            if (!userRes.ok) throw new Error('Invalid token — check scope and expiry.');

            const id = await findOrCreateGist(token);
            storeToken(token);
            localStorage.setItem(STORAGE_KEY_GIST_ID, id);
            authToken = token;
            gistId    = id;

            loadingEl.textContent = '✓ Connected!';
            await bootstrapApp();
        } catch (e) {
            errorEl.textContent = e.message || 'Connection failed.';
            loadingEl.textContent = '';
        } finally {
            document.getElementById('token-submit').disabled = false;
        }
    });

    // Allow Enter key on token input
    document.getElementById('token-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('token-submit').click();
    });

    // ═══════════════════════════════════════════════════
    //  CLOCK
    // ═══════════════════════════════════════════════════
    function updateDateTime() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm  = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        const timeString = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
        const dateString = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('current-datetime').textContent = `${dateString} ${timeString}`;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // ═══════════════════════════════════════════════════
    //  SEARCH BAR
    // ═══════════════════════════════════════════════════
    const searchTextElement = document.getElementById('search-text');
    let searchQuery = '';

    function isValidUrl(string) {
        const urlRegex = /^(https?:\/\/(?:www\.|(?!www))[a-zA-Z0-9][a-zA-Z0-9-]+[a-zA-Z0-9]\.[^\s]{2,}|www\.[a-zA-Z0-9][a-zA-Z0-9-]+[a-zA-Z0-9]\.[^\s]{2,}|https?:\/\/[a-zA-Z0-9]+\.[^\s]{2,}|[a-zA-Z0-9]+\.[^\s]{2,})$/i;
        return urlRegex.test(string);
    }

    document.addEventListener('keydown', (event) => {
        const modalOpen = document.getElementById('settings-modal').classList.contains('show');
        const gateOpen  = document.getElementById('token-gate').classList.contains('show');
        if (modalOpen || gateOpen) return;

        if (event.key === 'Backspace' || event.key === 'Enter' || event.key.length === 1) {
            event.preventDefault();
        }
        if (event.key === 'Backspace') {
            searchQuery = searchQuery.slice(0, -1);
        } else if (event.key === 'Enter') {
            const q = searchQuery.trim();
            if (q) {
                let url = isValidUrl(q) ? (q.startsWith('http') ? q : `http://${q}`)
                                        : `https://www.duckduckgo.com/search?q=${encodeURIComponent(q)}`;
                window.open(url, '_blank');
            }
            searchQuery = '';
        } else if (event.key.length === 1) {
            searchQuery += event.key;
        }
        searchTextElement.textContent = searchQuery;
    });

    // ═══════════════════════════════════════════════════
    //  RENDER BOOKMARKS
    // ═══════════════════════════════════════════════════
    const linksPerPage = 5;

    function renderBookmarks() {
        const container = document.getElementById('bookmarks-container');
        container.innerHTML = '';

        bookmarksData.forEach(categoryData => {
            const categoryDiv = document.createElement('div');
            categoryDiv.classList.add('category');

            const linksDiv = document.createElement('div');
            linksDiv.classList.add('links');

            const titleLi = document.createElement('li');
            titleLi.classList.add('title');
            titleLi.textContent = categoryData.title;
            linksDiv.appendChild(titleLi);

            // Build DOM nodes but do NOT store them back on categoryData
            // (that was the source of the DOMException clone bug)
            const linkElements = categoryData.links.map(link => {
                const li = document.createElement('li');
                const a  = document.createElement('a');
                a.href = link.url;
                a.textContent = link.text;
                a.target = '_blank';
                if (link.starred) a.classList.add('starred-link');
                li.appendChild(a);
                return li;
            });

            let currentPage = 0;
            const totalLinks = linkElements.length;

            function showPage(page) {
                // Remove all link lis (keep titleLi)
                Array.from(linksDiv.querySelectorAll('li:not(.title)')).forEach(el => el.remove());
                const start = page * linksPerPage;
                const end   = Math.min(start + linksPerPage, totalLinks);
                for (let i = start; i < end; i++) {
                    linksDiv.appendChild(linkElements[i]);
                }
            }

            showPage(0);
            categoryDiv.appendChild(linksDiv);

            const toggleButton = document.createElement('button');
            toggleButton.classList.add('toggle-links-button');
            toggleButton.textContent = '>';
            toggleButton.style.display = totalLinks <= linksPerPage ? 'none' : 'block';
            toggleButton.addEventListener('click', () => {
                currentPage++;
                if (currentPage * linksPerPage >= totalLinks) currentPage = 0;
                showPage(currentPage);
            });
            categoryDiv.appendChild(toggleButton);

            container.appendChild(categoryDiv);
        });
    }

    // ═══════════════════════════════════════════════════
    //  SETTINGS MODAL
    // ═══════════════════════════════════════════════════
    const settingsButton          = document.getElementById('settings-button');
    const settingsModal           = document.getElementById('settings-modal');
    const closeButton             = settingsModal.querySelector('.close-button');
    const modalCategoriesContainer = document.getElementById('modal-categories');
    const addCategoryButton       = document.getElementById('add-category-button');
    const saveSettingsButton      = document.getElementById('save-settings-button');

    settingsButton.addEventListener('click', () => {
        settingsModal.classList.add('show');
        renderModalContent();
    });

    closeButton.addEventListener('click', () => settingsModal.classList.remove('show'));

    window.addEventListener('click', (event) => {
        if (event.target === settingsModal) settingsModal.classList.remove('show');
    });

    function renderModalContent() {
        modalCategoriesContainer.innerHTML = '';

        bookmarksData.forEach((category, categoryIndex) => {
            const categoryDiv = document.createElement('div');
            categoryDiv.classList.add('modal-category-item');

            // ── Category header ──
            const categoryHeader = document.createElement('div');
            categoryHeader.classList.add('modal-category-header');

            const categoryTitleInput = document.createElement('input');
            categoryTitleInput.type = 'text';
            categoryTitleInput.value = category.title;
            categoryTitleInput.classList.add('category-title-input');
            categoryTitleInput.addEventListener('input', (e) => { category.title = e.target.value; });
            categoryHeader.appendChild(categoryTitleInput);

            const deleteCategoryButton = document.createElement('button');
            deleteCategoryButton.classList.add('delete-button');
            deleteCategoryButton.textContent = 'Delete Category';
            deleteCategoryButton.addEventListener('click', () => {
                const confirmDiv = document.createElement('div');
                confirmDiv.classList.add('custom-confirm');
                confirmDiv.innerHTML = `
                    <p>Delete this category?</p>
                    <button id="confirm-yes">Yes</button>
                    <button id="confirm-no">No</button>
                `;
                document.body.appendChild(confirmDiv);
                document.getElementById('confirm-yes').addEventListener('click', () => {
                    bookmarksData.splice(categoryIndex, 1);
                    document.body.removeChild(confirmDiv);
                    renderModalContent();
                });
                document.getElementById('confirm-no').addEventListener('click', () => {
                    document.body.removeChild(confirmDiv);
                });
            });
            categoryHeader.appendChild(deleteCategoryButton);
            categoryDiv.appendChild(categoryHeader);

            // ── Links ──
            const linksList = document.createElement('div');
            linksList.classList.add('modal-links-list');

            category.links.forEach((link, linkIndex) => {
                const linkItem = document.createElement('div');
                linkItem.classList.add('modal-link-item');

                const starButton = document.createElement('button');
                starButton.classList.add('star-button');
                starButton.innerHTML = link.starred ? '★' : '☆';
                starButton.title = link.starred ? 'Unstar' : 'Star';
                if (link.starred) starButton.classList.add('is-starred');
                starButton.addEventListener('click', () => {
                    link.starred = !link.starred;
                    renderModalContent();
                });
                linkItem.appendChild(starButton);

                const linkTextInput = document.createElement('input');
                linkTextInput.type = 'text';
                linkTextInput.value = link.text;
                linkTextInput.placeholder = 'Link Text';
                linkTextInput.addEventListener('input', (e) => { link.text = e.target.value; });
                linkItem.appendChild(linkTextInput);

                const linkUrlInput = document.createElement('input');
                linkUrlInput.type = 'url';
                linkUrlInput.value = link.url;
                linkUrlInput.placeholder = 'Link URL';
                linkUrlInput.addEventListener('input', (e) => { link.url = e.target.value; });
                linkItem.appendChild(linkUrlInput);

                const deleteLinkButton = document.createElement('button');
                deleteLinkButton.classList.add('delete-button');
                deleteLinkButton.textContent = 'Delete';
                deleteLinkButton.addEventListener('click', () => {
                    category.links.splice(linkIndex, 1);
                    renderModalContent();
                });
                linkItem.appendChild(deleteLinkButton);

                linksList.appendChild(linkItem);
            });

            const addLinkButton = document.createElement('button');
            addLinkButton.classList.add('add-link-button');
            addLinkButton.textContent = 'Add Link';
            addLinkButton.addEventListener('click', () => {
                category.links.push({ text: '', url: '', starred: false });
                renderModalContent();
            });
            linksList.appendChild(addLinkButton);

            categoryDiv.appendChild(linksList);
            modalCategoriesContainer.appendChild(categoryDiv);
        });
    }

    addCategoryButton.addEventListener('click', () => {
        bookmarksData.push({ title: 'New Category', links: [{ text: '', url: '', starred: false }] });
        renderModalContent();
    });

    // ── Save Changes → Gist ───────────────────────────
    saveSettingsButton.addEventListener('click', async () => {
        saveSettingsButton.disabled = true;
        saveSettingsButton.textContent = 'Saving…';

        try {
            // CRITICAL: extract only plain serialisable data — no DOM nodes
            const cleanData = getSerializableData(bookmarksData);

            // Persist to GitHub Gist (cross-device sync)
            await saveToGist(authToken, gistId, cleanData);

            // Update in-memory state with clean copy
            bookmarksData = cleanData;

            // Also cache locally for offline fallback
            localStorage.setItem('bookmarksData_cache', JSON.stringify(cleanData));

            setSyncStatus('✓ saved', '#b8bb26');
            setTimeout(() => setSyncStatus(''), 3000);

            // Close modal and refresh bookmarks (redirect to home state)
            settingsModal.classList.remove('show');
            renderBookmarks();

        } catch (e) {
            setSyncStatus('✗ save failed: ' + e.message, '#cc241d');
            alert('Save failed: ' + e.message);
        } finally {
            saveSettingsButton.disabled = false;
            saveSettingsButton.textContent = 'Save Changes';
        }
    });

    // ═══════════════════════════════════════════════════
    //  BOOTSTRAP
    // ═══════════════════════════════════════════════════
    init();
    </script>
</body>

</html>
