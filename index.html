    <style>
        /* ── Token Gate Overlay ── */
        #token-gate {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        #token-gate.show { display: flex; }
        #token-box {
            background: #282828;
            border: 1px solid #83a598;
            border-radius: 10px;
            padding: 35px 40px;
            max-width: 480px;
            width: 90%;
            color: #ebdbb2;
            font-family: "Fira Code", monospace;
        }
        #token-box h2 {
            color: #fe8019;
            margin: 0 0 10px 0;
            text-align: left;
            font-size: 1.1em;
        }
        #token-box p {
            font-size: 0.82em;
            color: #a89984;
            margin: 0 0 18px 0;
            line-height: 1.6;
        }
        #token-box p a { color: #83a598; }
        #token-input {
            width: 100%;
            padding: 10px;
            background: #3c3836;
            border: 1px solid #83a598;
            border-radius: 5px;
            color: #ebdbb2;
            font-family: "Fira Code", monospace;
            font-size: 0.9em;
            box-sizing: border-box;
            margin-bottom: 14px;
        }
        #token-submit {
            background: #fe8019;
            color: #282828;
            border: none;
            padding: 10px 22px;
            border-radius: 5px;
            cursor: pointer;
            font-family: "Fira Code", monospace;
            font-size: 0.95em;
            width: 100%;
        }
        #token-submit:hover { background: #d65d0e; }
        #token-error {
            color: #cc241d;
            font-size: 0.82em;
            margin-top: 10px;
            min-height: 18px;
        }
        #token-loading {
            color: #83a598;
            font-size: 0.82em;
            margin-top: 10px;
        }
        /* ── Sync indicator ── */
        #sync-indicator {
            position: fixed;
            bottom: 14px;
            right: 18px;
            font-family: "Fira Code", monospace;
            font-size: 0.75em;
            color: #a89984;
            z-index: 999;
            pointer-events: none;

        /* ── Weather bar ── */
        /* ── Weather bar ── */
        #weather-bar {
            font-size: 0.72em;

            letter-spacing: 0.03em;

        #weather-bar:hover { color: #ebdbb2; }

        /* ── Location settings block ── */

            background: rgba(60,56,54,0.5);

    <script>
    // ═══════════════════════════════════════════════════
    //  DATABASE SCHEMA (stored as JSON in a GitHub Gist)
    //  File: startpage-bookmarks.json
    //  Schema:
    //  [
    //    {
    //      "title": "category name",
    //      "links": [
    //        { "text": "link label", "url": "https://...", "starred": false }
    //      ]
    //    }
    //  ]
    // ═══════════════════════════════════════════════════

    // ── Constants ──────────────────────────────────────
    const STORAGE_KEY_TOKEN      = 'sp_token';
    const STORAGE_KEY_EXPIRY     = 'sp_token_expiry';
    const STORAGE_KEY_GIST_ID    = 'sp_gist_id';
    const GIST_FILENAME          = 'startpage-bookmarks.json';
    const TOKEN_TTL_MS           = 30 * 24 * 60 * 60 * 1000; // 30 days
    const GIST_API               = 'https://api.github.com';

    // ── Token helpers ──────────────────────────────────
    function getStoredToken() {
        const expiry = localStorage.getItem(STORAGE_KEY_EXPIRY);
        if (!expiry || Date.now() > parseInt(expiry, 10)) {
            localStorage.removeItem(STORAGE_KEY_TOKEN);
            localStorage.removeItem(STORAGE_KEY_EXPIRY);
            return null;
        }
        return localStorage.getItem(STORAGE_KEY_TOKEN);
    }

    function storeToken(token) {
        localStorage.setItem(STORAGE_KEY_TOKEN, token);
        localStorage.setItem(STORAGE_KEY_EXPIRY, String(Date.now() + TOKEN_TTL_MS));
    }

    function clearToken() {
        localStorage.removeItem(STORAGE_KEY_TOKEN);
        localStorage.removeItem(STORAGE_KEY_EXPIRY);
        localStorage.removeItem(STORAGE_KEY_GIST_ID);
    }

    function gistHeaders(token) {
        return {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };
    }

    // ── Gist CRUD ──────────────────────────────────────
    async function findOrCreateGist(token) {
        // Search existing gists for our file
        let page = 1;
        while (true) {
            const res = await fetch(`${GIST_API}/gists?per_page=100&page=${page}`, {
                headers: gistHeaders(token)
            });
            if (!res.ok) throw new Error('Failed to list gists');
            const gists = await res.json();
            if (gists.length === 0) break;
            const found = gists.find(g => g.files && g.files[GIST_FILENAME]);
            if (found) return found.id;
            if (gists.length < 100) break;
            page++;
        }
        // Not found — create a new private gist with default data
        const res = await fetch(`${GIST_API}/gists`, {
            method: 'POST',
            headers: gistHeaders(token),
            body: JSON.stringify({
                description: 'Startpage Bookmarks',
                public: false,
                files: {
                    [GIST_FILENAME]: { content: JSON.stringify(DEFAULT_BOOKMARKS, null, 2) }
                }
            })
        });
        if (!res.ok) throw new Error('Failed to create gist');
        const gist = await res.json();
        return gist.id;
    }

    async function loadFromGist(token, gistId) {
        const res = await fetch(`${GIST_API}/gists/${gistId}`, {
            headers: gistHeaders(token),
            cache: 'no-store'
        });
        if (!res.ok) throw new Error('Failed to load gist');
        const gist = await res.json();
        const content = gist.files[GIST_FILENAME]?.content;
        if (!content) throw new Error('Gist file missing');
        const parsed = JSON.parse(content);
        // Support old format (plain array) and new format (object with bookmarks key)
        if (Array.isArray(parsed)) return { bookmarks: parsed, dotLinks: null, weatherCity: null };
        return parsed;
    }

    async function saveToGist(token, gistId, settings) {
        const res = await fetch(`${GIST_API}/gists/${gistId}`, {
            method: 'PATCH',
            headers: gistHeaders(token),
            body: JSON.stringify({
                files: {
                    [GIST_FILENAME]: { content: JSON.stringify(settings, null, 2) }
                }
            })
        });
        if (!res.ok) throw new Error('Failed to save to gist');
        return true;
    }

    function buildSettingsPayload() {
        const cleanBookmarks = getSerializableData(bookmarksData);
        const dotLinks       = loadDotLinks();
        const weatherCity    = localStorage.getItem('sp_weather_city') || null;
        const gifList        = loadGifList();
        const gifCurrentIdx  = gifIndex;
        return { bookmarks: cleanBookmarks, dotLinks, weatherCity, gifList, gifCurrentIdx };
    }

    // ── Clean data (FIX: strip DOM nodes before serialising) ──
    // The DOMException: HTMLLIElement could not be cloned was caused by
    // allOriginalLinks (DOM elements) being attached to bookmarksData objects.
    function getSerializableData(data) {
        return data.map(cat => ({
            title: cat.title,
            links: (cat.links || []).map(link => ({
                text:    link.text    || '',
                url:     link.url     || '',
                starred: !!link.starred
            }))
        }));
    }

    const syncEl = document.getElementById('sync-indicator');
    function setSyncStatus(msg, color) {
        syncEl.style.color = color || '#a89984';
        syncEl.textContent = msg;
    }

    // ═══════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════
    let bookmarksData = [];
    let authToken     = null;
    let gistId        = null;

    // ═══════════════════════════════════════════════════
    //  INIT — token gate
    // ═══════════════════════════════════════════════════
    async function init() {
        authToken = getStoredToken();
        gistId    = localStorage.getItem(STORAGE_KEY_GIST_ID);

        if (authToken && gistId) {
            await bootstrapApp();
        } else if (authToken && !gistId) {
            // Token exists but gist ID lost — re-discover
            try {
                setSyncStatus('⟳ discovering gist…');
                gistId = await findOrCreateGist(authToken);
                localStorage.setItem(STORAGE_KEY_GIST_ID, gistId);
                await bootstrapApp();
            } catch (e) {
                // Token may be expired/invalid
                clearToken();
                showTokenGate();
            }
        } else {
            showTokenGate();
        }
    }

    function showTokenGate() {
        document.getElementById('token-gate').classList.add('show');
    }

    function hideTokenGate() {
        document.getElementById('token-gate').classList.remove('show');
    }

    async function bootstrapApp() {
        try {
            setSyncStatus('⟳ syncing…');
            const settings = await loadFromGist(authToken, gistId);
            bookmarksData  = settings.bookmarks || DEFAULT_BOOKMARKS;
            // Restore dot links
            if (settings.dotLinks) {
                saveDotLinks(settings.dotLinks);
            }
            // Restore gif list
            if (settings.gifList && settings.gifList.length) {
                saveGifList(settings.gifList);
                gifIndex = settings.gifCurrentIdx || 0;
                renderGif();
            }
            // Restore weather city
            if (settings.weatherCity) {
                localStorage.setItem('sp_weather_city', settings.weatherCity);
            } else {
                localStorage.removeItem('sp_weather_city');
            }
            setSyncStatus('synced', '#b8bb26');
            setTimeout(() => setSyncStatus(''), 2500);
        } catch (e) {
            setSyncStatus('offline — using local cache', '#fabd2f');
            const cached = localStorage.getItem('bookmarksData_cache');
            bookmarksData = cached ? JSON.parse(cached) : DEFAULT_BOOKMARKS;
        }
        hideTokenGate();
        renderBookmarks();
    }

    // ── Token Gate Submit ──────────────────────────────

        errorEl.textContent   = '';

        try {

            const id = await findOrCreateGist(token);

            authToken = token;
            gistId    = id;

            loadingEl.textContent = 'connected';

            loadingEl.textContent = '';

    let use24h = localStorage.getItem('sp_clock_24h') === 'true';

    function updateDateTime() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        let timeString;
        if (use24h) {
            timeString = `${String(hours).padStart(2, '0')}:${minutes}:${seconds}`;
        } else {
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            timeString = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
        }
        const dateString = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('current-datetime').textContent = `${dateString} ${timeString}`;
    }

    const searchTextElement = document.getElementById('search-text');
    let searchQuery = '';

    function isValidUrl(string) {
        const urlRegex = /^(https?:\/\/(?:www\.|(?!www))[a-zA-Z0-9][a-zA-Z0-9-]+[a-zA-Z0-9]\.[^\s]{2,}|www\.[a-zA-Z0-9][a-zA-Z0-9-]+[a-zA-Z0-9]\.[^\s]{2,}|https?:\/\/[a-zA-Z0-9]+\.[^\s]{2,}|[a-zA-Z0-9]+\.[^\s]{2,})$/i;
        return urlRegex.test(string);
    }

        const modalOpen = document.getElementById('settings-modal').classList.contains('show');
        const gateOpen  = document.getElementById('token-gate').classList.contains('show');
        if (modalOpen || gateOpen) return;

        if (event.key === 'Backspace' || event.key === 'Enter' || event.key.length === 1) {
            event.preventDefault();
        }
        if (event.key === 'Backspace') {
            searchQuery = searchQuery.slice(0, -1);
        } else if (event.key === 'Enter') {
            const q = searchQuery.trim();
            if (q) {
                let url = isValidUrl(q) ? (q.startsWith('http') ? q : `http://${q}`)
                                        : `https://www.duckduckgo.com/search?q=${encodeURIComponent(q)}`;
                window.open(url, '_blank');
            }
            searchQuery = '';
        } else if (event.key.length === 1) {
            searchQuery += event.key;
        }
        searchTextElement.textContent = searchQuery;
    });

    const linksPerPage = 5;

    function renderBookmarks() {
        const container = document.getElementById('bookmarks-container');
        container.innerHTML = '';

        bookmarksData.forEach(categoryData => {
            const categoryDiv = document.createElement('div');
            categoryDiv.classList.add('category');

            const linksDiv = document.createElement('div');
            linksDiv.classList.add('links');

            const titleLi = document.createElement('li');
            titleLi.classList.add('title');
            titleLi.textContent = categoryData.title;
            linksDiv.appendChild(titleLi);

            // Build DOM nodes but do NOT store them back on categoryData
            // (that was the source of the DOMException clone bug)
            const linkElements = categoryData.links.map(link => {
                const li = document.createElement('li');
                const a  = document.createElement('a');
                a.href = link.url;
                a.textContent = link.text;
                a.target = '_blank';
                if (link.starred) a.classList.add('starred-link');
                li.appendChild(a);
                return li;
            });

            let currentPage = 0;
            const totalLinks = linkElements.length;

            function showPage(page) {
                // Remove all link lis (keep titleLi)
                Array.from(linksDiv.querySelectorAll('li:not(.title)')).forEach(el => el.remove());
                const start = page * linksPerPage;
                const end   = Math.min(start + linksPerPage, totalLinks);
                for (let i = start; i < end; i++) {
                    linksDiv.appendChild(linkElements[i]);
                }
            }

            showPage(0);
            categoryDiv.appendChild(linksDiv);

            const totalPages = Math.ceil(totalLinks / linksPerPage);

            if (totalPages > 1) {
                const dotsContainer = document.createElement('div');
                dotsContainer.classList.add('page-dots');

                function updateDots() {
                    Array.from(dotsContainer.querySelectorAll('.page-dot')).forEach((dot, i) => {
                        dot.classList.toggle('active', i === currentPage);
                    });
                }

                dotsContainer.addEventListener('click', () => {
                    currentPage = (currentPage + 1) % totalPages;
                    showPage(currentPage);
                    updateDots();
                });

                for (let i = 0; i < totalPages; i++) {
                    const dot = document.createElement('button');
                    dot.classList.add('page-dot');
                    if (i === 0) dot.classList.add('active');
                    dot.addEventListener('click', (e) => {
                        e.stopPropagation();
                        currentPage = i === currentPage ? (i + 1) % totalPages : i;
                        showPage(currentPage);
                        updateDots();
                    });
                    dotsContainer.appendChild(dot);
                }

                categoryDiv.appendChild(dotsContainer);
            }

            container.appendChild(categoryDiv);
        });
    }

    const weatherBar    = document.getElementById('weather-bar');

    let weatherOpen     = false;
    let weatherCache    = null;

    function wmoCondition(code) {
        if (code === 0)  return 'Clear';
        if (code <= 2)   return 'P.Cloudy';
        if (code === 3)  return 'Cloudy';
        if (code <= 49)  return 'Foggy';
        if (code <= 59)  return 'Drizzle';
        if (code <= 69)  return 'Rain';
        if (code <= 79)  return 'Snow';
        if (code <= 84)  return 'Rain';
        if (code <= 94)  return 'Storm';
        return 'Thunder';
    }

    function wmoLabel(code) {
        if (code === 0)  return 'Clear';
        if (code <= 2)   return 'Partly Cloudy';
        if (code === 3)  return 'Overcast';
        if (code <= 49)  return 'Foggy';
        if (code <= 59)  return 'Drizzle';
        if (code <= 69)  return 'Rain';
        if (code <= 79)  return 'Snow';
        if (code <= 84)  return 'Showers';
        if (code <= 94)  return 'Thunderstorm';
        return 'Storm';
    }

    async function fetchWeatherByCoords(lat, lon, label) {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
            `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code` +
            `&daily=precipitation_probability_max&timezone=auto&forecast_days=1`;
        const r = await fetch(url);
        if (!r.ok) throw new Error('weather fetch failed');
        const d = await r.json();
        const c = d.current;
        const desc  = wmoLabel(c.weather_code);
        const temp  = Math.round(c.temperature_2m);
        const feels = Math.round(c.apparent_temperature);
        const humid = c.relative_humidity_2m;
        const rain  = d.daily.precipitation_probability_max[0] ?? '—';
        weatherCache = {
            bar:      `${label} · ${temp}°C · ${desc}`,
            humidity:  `${humid}%`,
            rain:      `${rain}%`,
            feelsLike: `${feels}°C`
        };
        renderWeather();
    }

    // Reverse-geocode coords → "Suburb, City" using Nominatim
    async function reverseGeocode(lat, lon) {
        try {
            const r = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=14&addressdetails=1`,
                { headers: { 'Accept-Language': 'en' } }
            );
            if (!r.ok) return null;
            const d = await r.json();
            const a = d.address || {};
            // Pick the most specific neighbourhood-level name available
            const sub  = a.suburb || a.neighbourhood || a.quarter || a.village || a.town || '';
            const city = a.city || a.county || a.state_district || a.state || '';
            if (sub && city) return `${sub}, ${city}`;
            if (city)        return city;
        } catch {}
        return null;
    }

    async function fetchWeatherByCity(city) {
        const geo = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`
        );
        if (!geo.ok) throw new Error('geocoding failed');
        const gd = await geo.json();
        if (!gd.results || !gd.results.length) throw new Error(`"${city}" not found`);
        const { latitude, longitude, name, admin1 } = gd.results[0];
        // Use "Name, Region" — no country code
        const label = admin1 && admin1 !== name ? `${name}, ${admin1}` : name;
        await fetchWeatherByCoords(latitude, longitude, label);
    }

    function renderWeather() {
        if (!weatherCache) return;
        weatherBar.textContent = weatherOpen
            ? `hum: ${weatherCache.humidity}  rain: ${weatherCache.rain}  feels: ${weatherCache.feelsLike}`
            : weatherCache.bar;
    }

    weatherBar.addEventListener('click', () => {
        if (!weatherCache) return;
        weatherOpen = !weatherOpen;
        renderWeather();
    });

    async function initWeather() {
        const savedCity = localStorage.getItem('sp_weather_city');
        if (savedCity) {
            weatherBar.textContent = 'loading…';
            try { await fetchWeatherByCity(savedCity); }
            catch { weatherBar.textContent = 'weather unavailable'; }
        } else {
            if (!navigator.geolocation) return;
            weatherBar.textContent = 'locating…';
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    try {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const label = await reverseGeocode(lat, lon) || 'Here';
                        await fetchWeatherByCoords(lat.toFixed(4), lon.toFixed(4), label);
                    } catch { weatherBar.textContent = 'weather unavailable'; }
                },
                () => { weatherBar.textContent = ''; }
            );
        }
        setInterval(() => initWeather(), 15 * 60 * 1000);
    }

    // ═══════════════════════════════════════════════════
    const GIF_DEFAULT = ['cat.gif'];
    let gifIndex = 0;

    function loadGifList() {
        try {
            const s = localStorage.getItem('sp_gif_list');
            const list = s ? JSON.parse(s) : null;
            return (Array.isArray(list) && list.length) ? list : [...GIF_DEFAULT];
        } catch { return [...GIF_DEFAULT]; }
    }

    function saveGifList(list) {
        localStorage.setItem('sp_gif_list', JSON.stringify(list));
    }

    function renderGif() {
        const list  = loadGifList();
        const total = list.length;
        gifIndex    = Math.max(0, Math.min(gifIndex, total - 1));

        const img        = document.getElementById('gif-img');
        const dotsWrap   = document.getElementById('gif-page-dots');
        if (!img) return;

        img.src = list[gifIndex];

        // Rebuild dots — same pattern as bookmark page dots
        dotsWrap.innerHTML = '';
        if (total > 1) {
            dotsWrap.style.display = 'flex';
            list.forEach((_, i) => {
                const dot = document.createElement('button');
                dot.classList.add('page-dot');
                if (i === gifIndex) dot.classList.add('active');
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    gifIndex = (i === gifIndex) ? (i + 1) % total : i;
                    renderGif();
                });
                dotsWrap.appendChild(dot);
            });
            // Clicking the dots bar (not a dot) also advances
            dotsWrap.onclick = (e) => {
                if (e.target === dotsWrap) {
                    gifIndex = (gifIndex + 1) % total;
                    renderGif();
                }
            };
        } else {
            dotsWrap.style.display = 'none';
        }
    }

    function renderGifSettings() {
        const list      = loadGifList();
        const container = document.getElementById('gif-settings-list');
        if (!container) return;
        container.innerHTML = '';

        list.forEach((url, i) => {
            const row = document.createElement('div');
            row.className = 'gif-settings-row';

            const thumb = document.createElement('img');
            thumb.className = 'gif-thumb';
            thumb.src = url;

            const label = document.createElement('span');
            label.className = 'gif-row-url';
            label.textContent = url.startsWith('data:') ? '[local file]' : url;
            label.title = url.startsWith('data:') ? '' : url;

            const useBtn = document.createElement('button');
            useBtn.className = 'modal-button loc-btn';
            useBtn.textContent = i === gifIndex ? 'active' : 'use';
            useBtn.style.minWidth = '46px';
            useBtn.addEventListener('click', () => {
                gifIndex = i;
                renderGif();
                renderGifSettings();
            });

            const delBtn = document.createElement('button');
            delBtn.className = 'modal-button loc-btn';
            delBtn.textContent = 'x';
            delBtn.style.background = '#3c3836';
            delBtn.addEventListener('click', () => {
                if (list.length === 1) {
                    document.getElementById('gif-status').textContent = 'need at least one gif';
                    return;
                }
                list.splice(i, 1);
                if (gifIndex >= list.length) gifIndex = list.length - 1;
                saveGifList(list);
                renderGif();
                renderGifSettings();
            });

            row.appendChild(thumb);
            row.appendChild(label);
            row.appendChild(useBtn);
            row.appendChild(delBtn);
            container.appendChild(row);
        });
    }

        { label: 'claude',  url: 'https://claude.ai/new' },
        { label: 'gemini',  url: 'https://gemini.google.com/app' },
        { label: 'chatgpt', url: 'https://chatgpt.com' },
    ];

    function loadDotLinks() {
        try {
            const saved = localStorage.getItem('sp_dot_links');
            return saved ? JSON.parse(saved) : DOT_DEFAULTS.map(d => ({...d}));
        } catch { return DOT_DEFAULTS.map(d => ({...d})); }
    }

    function saveDotLinks(links) {
        localStorage.setItem('sp_dot_links', JSON.stringify(links));
    }

    function renderDotButtons() {
        const links = loadDotLinks();
        links.forEach((link, i) => {
            const el = document.getElementById(`dot-btn-${i + 1}`);
            if (!el) return;
            el.href = link.url || '#';
            el.setAttribute('data-tooltip', link.label || '');
        });
    }

    function renderDotSettings() {
        const links = loadDotLinks();
        const container = document.getElementById('dot-links-settings');
        if (!container) return;
        container.innerHTML = '';
        links.forEach((link, i) => {
            const row = document.createElement('div');
            row.className = 'location-row';
            row.style.marginBottom = '8px';

            const labelInput = document.createElement('input');
            labelInput.type = 'text';
            labelInput.value = link.label;
            labelInput.placeholder = 'label';
            labelInput.style.cssText = 'flex:0 0 90px;min-width:0;padding:7px 8px;border:1px solid #83a598;border-radius:5px;background:#3c3836;color:#ebdbb2;font-family:"Fira Code",monospace;font-size:0.82em;box-sizing:border-box;';

            const urlInput = document.createElement('input');
            urlInput.type = 'url';
            urlInput.value = link.url;
            urlInput.placeholder = 'https://…';
            urlInput.style.cssText = 'flex:1;min-width:0;padding:7px 8px;border:1px solid #504945;border-radius:5px;background:#3c3836;color:#ebdbb2;font-family:"Fira Code",monospace;font-size:0.82em;box-sizing:border-box;';

            const saveBtn = document.createElement('button');
            saveBtn.textContent = 'Set';
            saveBtn.className = 'modal-button loc-btn';

            saveBtn.addEventListener('click', () => {
                links[i].label = labelInput.value.trim();
                links[i].url   = urlInput.value.trim();
                saveDotLinks(links);
                renderDotButtons();
            });

            row.appendChild(labelInput);
            row.appendChild(urlInput);
            row.appendChild(saveBtn);
            container.appendChild(row);
        });
    }

    // Hook into modal open to render dot + gif settings
    const _origModalOpen = document.querySelector('.top-left-link-button');
    if (_origModalOpen) {
        _origModalOpen.addEventListener('click', () => {
            renderDotSettings();
            renderGifSettings();
        });
    }

    renderDotButtons();

    initWeather();

    // ═══════════════════════════════════════════════════
    //  BOOTSTRAP
    // ═══════════════════════════════════════════════════
    init();
    </script>
</body>

</html>
